name: certificate.yml
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  certificate:
    name: "certificate C API Python module"

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "CentOS Stream 10"
            image: "quay.io/centos/centos:stream10"
          - name: "Fedora latest"
            image: "registry.fedoraproject.org/fedora:latest"
          - name: "Fedora Rawhide"
            image: "registry.fedoraproject.org/fedora:rawhide"

    container:
      image: ${{ matrix.image }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Enable CRB repository"
        if: ${{ matrix.name == 'CentOS Stream 10' }}
        run: |
          dnf --setopt install_weak_deps=False install -y dnf-plugins-core
          dnf config-manager --enable crb

      - name: "Install packages"
        run: |
          dnf --setopt install_weak_deps=False install -y \
            cmake gcc glib2-devel valgrind openssl-devel python3-devel

      - name: "Build _certificate.so Python module"
        run: |
          cd './src/'
          mkdir build && cd build
          cmake ../ -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          make

      - name: "Run C unit tests of _certificate.so Python module"
        run: |
          cd './src/build'
          CTEST_OUTPUT_ON_FAILURE=1 make test

      - name: "Run C unit tests of _certificate.so Python module using valgrind"
        run: |
          cd './src/build'
          valgrind --leak-check=full -s --track-origins=yes ./test_certificate