upstream_package_name: subscription-manager
downstream_package_name: subscription-manager
specfile_path: subscription-manager.spec
upstream_tag_template: "subscription-manager-{version}-1"

jobs:
  - job: copr_build
    trigger: pull_request
    targets:
      - rhel-8-x86_64
      - rhel-8-aarch64
      - rhel-9-x86_64
      - rhel-9-aarch64
      - rhel-10-x86_64
      - rhel-10-aarch64
      - rhel-10-s390x
      - rhel-10-ppc64le
      - centos-stream-10-x86_64
      - centos-stream-10-aarch64
      - centos-stream-10-s390x
      - centos-stream-10-ppc64le
      - fedora-all-x86_64
      - fedora-all-aarch64

  - job: copr_build
    trigger: commit
    branch: main
    owner: "@yggdrasil"
    project: latest
    targets:
      - rhel-8-x86_64
      - rhel-8-aarch64
      - rhel-9-x86_64
      - rhel-9-aarch64
      - rhel-10-x86_64
      - rhel-10-aarch64
      - rhel-10-s390x
      - rhel-10-ppc64le
      - centos-stream-10-x86_64
      - centos-stream-10-aarch64
      - centos-stream-10-s390x
      - centos-stream-10-ppc64le
      - fedora-all-x86_64
      - fedora-all-aarch64

#  - job: tests
